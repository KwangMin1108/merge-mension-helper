<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Merge Mansion Helper</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --card: #0f3460;
  --accent: #e94560;
  --accent2: #f5a623;
  --text: #eaeaea;
  --text-dim: #8892a4;
  --done: #1e4d38;
  --done-text: #74c69d;
  --current-bg: #2a1f0e;
  --current-border: #f5a623;
  --border: #1e3a5f;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Screens ───────────────────────────────── */
.screen { display: none; flex-direction: column; min-height: 100vh; }
.screen.active { display: flex; }

/* ── Header ────────────────────────────────── */
.header {
  background: var(--surface);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header h1 { font-size: 17px; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header .sub { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
.back-btn { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; padding: 0 4px; line-height: 1; flex-shrink: 0; }

/* ── Progress ──────────────────────────────── */
.progress-bar {
  flex-shrink: 0;
  background: var(--surface);
  padding: 8px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
.progress-track { background: var(--bg); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width .3s; }

/* ── Area List ─────────────────────────────── */
#areaList {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.area-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--border);
  -webkit-tap-highlight-color: transparent;
  transition: background .12s;
}
.area-card:active { background: #1a4a80; }
.area-name-ko { font-weight: 700; font-size: 15px; }
.area-name-en { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.area-progress { font-size: 12px; color: var(--text-dim); background: var(--bg); padding: 3px 8px; border-radius: 20px; white-space: nowrap; margin-left: 8px; flex-shrink: 0; }
.area-done { color: var(--done-text); }

/* ── 2-column layout ───────────────────────── */
.area-body {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* Left: quest list */
.quest-panel {
  width: 55%;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: .05em;
  padding: 8px 12px 6px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
}
#questList { flex: 1; overflow-y: auto; padding: 8px; }

/* Right: items + rewards stacked */
.right-panel {
  width: 45%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.items-panel {
  flex: 1;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}
.rewards-panel {
  height: 38%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.panel-scroll { flex: 1; overflow-y: auto; padding: 8px; }

/* Mobile: stack vertically */
@media (max-width: 640px) {
  .area-body { flex-direction: column; overflow: visible; height: auto; }
  .quest-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 55vh; }
  .right-panel { width: 100%; flex-direction: row; height: auto; }
  .items-panel { flex: 1; border-bottom: none; border-right: 1px solid var(--border); max-height: 45vmax; }
  .rewards-panel { width: 45%; height: auto; max-height: 45vmax; }
}

/* ── Quest items ───────────────────────────── */
.quest-item {
  padding: 8px 10px;
  margin-bottom: 5px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background .1s;
}
.quest-item.done { background: var(--done); border-color: #2d6a4f; }
.quest-item.current { background: var(--current-bg); border-color: var(--current-border); box-shadow: 0 0 0 1px var(--current-border); }
.quest-header { display: flex; align-items: baseline; gap: 6px; }
.quest-idx { font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
.quest-item.done .quest-idx { color: var(--done-text); }
.quest-desc { font-size: 13px; font-weight: 500; line-height: 1.35; flex: 1; }
.quest-item.done .quest-desc { color: var(--done-text); }
.current-tag { font-size: 9px; font-weight: 700; background: var(--accent2); color: #000; padding: 1px 5px; border-radius: 8px; flex-shrink: 0; }
.quest-xp { font-size: 10px; color: var(--accent2); margin-top: 3px; }
.quest-reqs { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.req-chip {
  display: flex; align-items: center; gap: 3px;
  background: rgba(0,0,0,.25); border-radius: 20px;
  padding: 1px 6px 1px 3px; font-size: 10px; color: var(--text-dim);
}
.req-chip img { width: 16px; height: 16px; object-fit: contain; border-radius: 3px; }
.req-icon-ph { width: 16px; height: 16px; background: var(--border); border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; font-size: 8px; color: var(--text-dim); flex-shrink: 0; }
.quest-item.done .req-chip { opacity: .6; }

/* ── Items needed ──────────────────────────── */
.item-row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 6px;
  border-radius: var(--radius);
  background: var(--card);
  border: 1px solid var(--border);
  margin-bottom: 4px;
}
.item-row img { width: 28px; height: 28px; object-fit: contain; border-radius: 5px; flex-shrink: 0; }
.item-icon-ph { width: 28px; height: 28px; background: var(--border); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text-dim); flex-shrink: 0; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 11px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-chain { font-size: 9px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-qty { font-size: 13px; font-weight: 700; color: var(--accent2); flex-shrink: 0; }

/* ── Rewards ───────────────────────────────── */
.reward-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 8px;
  border-radius: var(--radius);
  background: var(--card);
  border: 1px solid var(--border);
  margin-bottom: 4px;
  font-size: 12px;
}
.reward-row .ramt { font-weight: 700; color: var(--accent2); }

/* ── Empty / footer ────────────────────────── */
.empty { text-align: center; padding: 20px 12px; color: var(--text-dim); font-size: 12px; }
.footer { text-align: center; padding: 14px 16px; font-size: 10px; color: var(--text-dim); border-top: 1px solid var(--border); flex-shrink: 0; }
.footer a { color: var(--accent); text-decoration: none; }

/* ── Loading ───────────────────────────────── */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 999;
}
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { color: var(--text-dim); font-size: 13px; }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>데이터 로딩 중...</p></div>

<!-- ══ Screen 1: Area List ══ -->
<div id="screenAreas" class="screen">
  <div class="header">
    <div style="flex:1">
      <h1>🏠 Merge Mansion Helper</h1>
      <div class="sub">지역을 선택하세요</div>
    </div>
  </div>
  <div id="areaList"></div>
  <div class="footer">Data sourced from <a href="https://merge-mansion.fandom.com/wiki/Areas" target="_blank">Merge Mansion Wiki</a> (CC-BY-SA)</div>
</div>

<!-- ══ Screen 2: Area Detail ══ -->
<div id="screenArea" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showAreaList()">‹</button>
    <div style="flex:1;min-width:0">
      <h1 id="areaTitle"></h1>
      <div class="sub" id="areaSub"></div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-labels">
      <span id="progressLabel">진행도</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="area-body">
    <!-- Left: quests -->
    <div class="quest-panel">
      <div class="panel-title">📋 임무 목록</div>
      <div id="questList"></div>
    </div>

    <!-- Right: items + rewards -->
    <div class="right-panel">
      <div class="items-panel">
        <div class="panel-title">🧰 남은 필요 아이템</div>
        <div class="panel-scroll" id="itemsList"></div>
      </div>
      <div class="rewards-panel">
        <div class="panel-title">🎁 남은 보상</div>
        <div class="panel-scroll" id="rewardsList"></div>
      </div>
    </div>
  </div>
</div>

<script>
let DATA = null;
let currentArea = null;
let currentTaskIndex = 0;

function imgUrl(url) {
  if (!url) return null;
  return url.split('/').map(encodeURIComponent).join('/');
}

// ── State ─────────────────────────────────────────────────────────
function saveState() {
  const saved = JSON.parse(localStorage.getItem('mmh_progress') || '{}');
  if (currentArea) saved[currentArea.name] = currentTaskIndex;
  localStorage.setItem('mmh_progress', JSON.stringify(saved));
}
function loadTaskIndex(areaName) {
  return JSON.parse(localStorage.getItem('mmh_progress') || '{}')[areaName] ?? 0;
}

// ── Load data ─────────────────────────────────────────────────────
async function loadData() {
  const resp = await fetch('data.json');
  DATA = await resp.json();
  document.getElementById('loading').style.display = 'none';
  showAreaList();
}

// ── Screen: Area List ─────────────────────────────────────────────
function showAreaList() {
  showScreen('screenAreas');
  const saved = JSON.parse(localStorage.getItem('mmh_progress') || '{}');
  const container = document.getElementById('areaList');
  container.innerHTML = '';

  DATA.areas.filter(a => a.tasks.length > 0).forEach(area => {
    const done = saved[area.name] ?? 0;
    const total = area.tasks.length;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    const isDone = done >= total && total > 0;

    const card = document.createElement('div');
    card.className = 'area-card';
    card.innerHTML = `
      <div style="min-width:0;flex:1">
        <div class="area-name-ko">${area.nameKo || area.name}</div>
        <div class="area-name-en">${area.nameKo ? area.name : ''}</div>
      </div>
      <div class="area-progress ${isDone ? 'area-done' : ''}">
        ${done > 0 ? `${done}/${total} (${pct}%)` : `${total}개`}
      </div>`;
    card.onclick = () => openArea(area);
    container.appendChild(card);
  });
}

// ── Screen: Area Detail ───────────────────────────────────────────
function openArea(area) {
  currentArea = area;
  currentTaskIndex = loadTaskIndex(area.name);
  showScreen('screenArea');
  document.getElementById('areaTitle').textContent = area.nameKo || area.name;
  render();
}

function render() {
  if (!currentArea) return;
  const tasks = currentArea.tasks;
  const done = currentTaskIndex;
  const total = tasks.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  document.getElementById('areaSub').textContent = `${currentArea.name} · ${done}/${total} 완료`;
  document.getElementById('progressLabel').textContent = '진행도';
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;

  renderQuests(tasks, done);
  renderItems(tasks, done);
  renderRewards(tasks, done);
}

function renderQuests(tasks, done) {
  const el = document.getElementById('questList');
  el.innerHTML = tasks.map((task, i) => {
    const isDone = i < done;
    const isCurrent = i === done;
    const cls = isDone ? 'done' : isCurrent ? 'current' : '';

    const reqs = task.requirements.map(r => {
      const item = DATA.items[r.name] || {};
      const name = item.name || r.name;
      const url = imgUrl(item.imageUrl);
      const icon = url
        ? `<img src="${url}" alt="${name}" loading="lazy" onerror="this.style.display='none'">`
        : `<span class="req-icon-ph">${r.name.slice(0,2)}</span>`;
      return `<span class="req-chip">${icon}${name}×${r.amount}</span>`;
    }).join('');

    const xp = task.rewards?.xp || 0;
    const rewardItem = task.rewards?.item;
    const rewardItemName = rewardItem ? (DATA.items[rewardItem]?.name || rewardItem) : '';

    return `<div class="quest-item ${cls}" onclick="setCurrentTask(${i})">
      <div class="quest-header">
        <span class="quest-idx">${task.index}</span>
        <span class="quest-desc">${task.desc}</span>
        ${isCurrent ? '<span class="current-tag">현재</span>' : ''}
      </div>
      ${xp || rewardItemName ? `<div class="quest-xp">${xp ? `⭐ ${xp} XP` : ''}${xp && rewardItemName ? ' · ' : ''}${rewardItemName ? `🎁 ${rewardItemName}` : ''}</div>` : ''}
      ${reqs ? `<div class="quest-reqs">${reqs}</div>` : ''}
    </div>`;
  }).join('');

  // Scroll current task into view
  setTimeout(() => {
    const cur = el.querySelector('.quest-item.current');
    if (cur) cur.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }, 80);
}

function renderItems(tasks, done) {
  const el = document.getElementById('itemsList');
  const remaining = tasks.slice(done);
  const totals = {};
  for (const task of remaining)
    for (const req of task.requirements)
      totals[req.name] = (totals[req.name] || 0) + req.amount;

  const entries = Object.entries(totals).sort((a, b) => b[1] - a[1]);
  if (!entries.length) {
    el.innerHTML = '<div class="empty">없음 🎉</div>'; return;
  }

  el.innerHTML = entries.map(([id, qty]) => {
    const item = DATA.items[id] || {};
    const name = item.name || id;
    const chain = item.chainName || '';
    const url = imgUrl(item.imageUrl);
    const icon = url
      ? `<img src="${url}" alt="${name}" loading="lazy" onerror="this.parentElement.querySelector('.item-icon-ph').style.display='flex';this.style.display='none'">`
      : '';
    const ph = `<div class="item-icon-ph" style="${url ? 'display:none' : ''}">${id.slice(0,3)}</div>`;
    return `<div class="item-row">${icon}${ph}
      <div class="item-info">
        <div class="item-name" title="${name}">${name}</div>
        <div class="item-chain">${chain}</div>
      </div>
      <div class="item-qty">×${qty}</div>
    </div>`;
  }).join('');
}

function renderRewards(tasks, done) {
  const el = document.getElementById('rewardsList');
  const remaining = tasks.slice(done);
  let totalXP = 0;
  const items = {};
  for (const task of remaining) {
    totalXP += task.rewards?.xp || 0;
    if (task.rewards?.item)
      items[task.rewards.item] = (items[task.rewards.item] || 0) + 1;
  }

  if (!totalXP && !Object.keys(items).length) {
    el.innerHTML = '<div class="empty">없음 🎉</div>'; return;
  }

  const rows = [];
  if (totalXP) rows.push(`<div class="reward-row"><span>⭐ 경험치</span><span class="ramt">${totalXP.toLocaleString()}</span></div>`);
  for (const [id, cnt] of Object.entries(items)) {
    const name = DATA.items[id]?.name || id;
    rows.push(`<div class="reward-row"><span>🎁 ${name}</span><span class="ramt">×${cnt}</span></div>`);
  }
  el.innerHTML = rows.join('');
}

// ── Interactions ──────────────────────────────────────────────────
function setCurrentTask(index) {
  currentTaskIndex = index;
  saveState();
  render();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Boot ──────────────────────────────────────────────────────────
loadData().catch(err => {
  document.getElementById('loading').innerHTML = `
    <div style="color:var(--accent);font-size:16px">❌ 데이터 로드 실패</div>
    <div style="color:var(--text-dim);font-size:12px;margin-top:8px">${err.message}</div>
    <div style="color:var(--text-dim);font-size:11px;margin-top:12px">로컬 실행 시: <code>python3 -m http.server</code></div>`;
});
</script>
</body>
</html>
