<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Merge Mansion Helper</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --card: #0f3460;
  --accent: #e94560;
  --accent2: #f5a623;
  --text: #eaeaea;
  --text-dim: #8892a4;
  --done: #1e4d38;
  --done-text: #74c69d;
  --current-bg: #2a1f0e;
  --current-border: #f5a623;
  --border: #1e3a5f;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Screens ───────────────────────────────── */
.screen { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
.screen.active { display: flex; }

/* ── Header ────────────────────────────────── */
.header {
  background: var(--surface);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header h1 { font-size: 17px; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header .sub { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
.back-btn { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; padding: 0 4px; line-height: 1; flex-shrink: 0; }
.lang-select {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 5px;
  cursor: pointer;
  flex-shrink: 0;
}

/* ── Progress ──────────────────────────────── */
.progress-bar {
  flex-shrink: 0;
  background: var(--surface);
  padding: 8px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
.progress-track { background: var(--bg); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width .3s; }

/* ── Area List ─────────────────────────────── */
#areaList {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.area-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--border);
  -webkit-tap-highlight-color: transparent;
  transition: background .12s;
}
.area-card:active { background: #1a4a80; }
.area-name-ko { font-weight: 700; font-size: 15px; }
.area-name-en { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.area-progress { font-size: 12px; color: var(--text-dim); background: var(--bg); padding: 3px 8px; border-radius: 20px; white-space: nowrap; margin-left: 8px; flex-shrink: 0; }
.area-done { color: var(--done-text); }

/* ── 2-column layout ───────────────────────── */
.area-body {
  flex: 1;
  display: flex;
  overflow: hidden; /* each column scrolls independently */
  min-height: 0;
}

/* Left: quest list — own scroll */
.quest-panel {
  width: 55%;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: .05em;
  padding: 8px 12px 6px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  display: flex;
  align-items: center;
}
#questList { padding: 8px; overflow-y: auto; flex: 1; }

/* Right panel — fixed alongside left, own internal scroll */
.right-panel {
  width: 45%;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.items-panel {
  flex: 1;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.rewards-panel {
  height: 36%;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.panel-scroll { flex: 1; overflow-y: auto; padding: 8px; }

/* view toggle button in panel title */
.view-toggle {
  margin-left: auto;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 9px;
  padding: 1px 7px;
  border-radius: 10px;
  cursor: pointer;
  white-space: nowrap;
}

/* compact icon grid */
.items-compact-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.item-chip {
  position: relative;
  flex-shrink: 0;
  cursor: default;
  width: 48px;
  height: 48px;
}
.item-chip img,
.item-chip-ph {
  width: 44px;
  height: 44px;
  object-fit: contain;
  border-radius: 8px;
  border: 1px solid var(--border);
  display: block;
}
.item-chip-ph {
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  color: var(--text-dim);
}
.item-chip-qty {
  position: absolute; bottom: 0; right: 0;
  background: var(--accent2); color: #000;
  font-size: 9px; font-weight: 700;
  padding: 0 3px; border-radius: 4px; line-height: 14px;
  pointer-events: none;
}
.item-chip-lv {
  position: absolute; top: 0; left: 0;
  background: rgba(74,144,226,0.9); color: #fff;
  font-size: 8px; font-weight: 700;
  padding: 0 2px; border-radius: 3px; line-height: 13px;
  pointer-events: none;
}

/* Mobile: stack vertically, no page scroll */
@media (max-width: 640px) {
  .area-body { flex-direction: column; overflow: hidden; }
  .quest-panel {
    width: 100%; border-right: none;
    border-bottom: 1px solid var(--border);
    flex: 1; min-height: 0;
  }
  .right-panel {
    width: 100%; flex: 1; min-height: 0;
    flex-direction: row; overflow: hidden;
  }
  .items-panel { min-height: 0; max-height: none; border-bottom: none; border-right: 1px solid var(--border); }
  .rewards-panel { width: 38%; height: auto; min-height: 0; flex-shrink: 0; }
}


/* ── Swimlane row-based branch layout ──────── */
.swimlane-body { display: flex; flex-direction: column; }
.level-row { display: flex; gap: 6px; }
/* Row-to-row connector gap — holds per-row-transition SVG bezier curves */
.row-connector {
  height: 14px;
  position: relative;
  width: 100%;
  flex-shrink: 0;
}
.row-connector svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
}
/* Active lane cell: equal share of remaining width */
.level-cell {
  flex: 1 1 0;
  min-width: 0;
  container-type: inline-size;
}
/* Exhausted lane cell: thin blue strip, no content */
.level-strip {
  flex: 0 0 4px;
  background: rgba(74, 144, 226, 0.75);
  border-radius: 2px;
  align-self: stretch;
}

/* ── Compact quest layout for narrow lane cells ─── */
@container (max-width: 90px) {
  .quest-item {
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
    padding: 5px 6px;
  }
  .quest-desc, .quest-xp, .quest-unlock, .done-tag { display: none; }
  .quest-reqs { max-width: 100%; justify-content: flex-start; }
  .quest-idx { font-size: 11px; font-weight: 600; }
}

/* Branch connector gaps — hold the split/merge SVG curves */
.branch-split-gap,
.branch-merge-gap {
  position: relative;
  width: 100%;
  flex-shrink: 0;
}
.branch-split-gap { height: 36px; }
.branch-merge-gap { height: 52px; }
.branch-split-gap svg,
.branch-merge-gap svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
}

/* ── Quest items ───────────────────────────── */
.quest-item {
  padding: 8px 10px;
  margin-bottom: 5px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background .1s;
  display: flex; align-items: center; gap: 8px;
}
.quest-item.done { background: var(--done); border-color: #2d6a4f; }
.quest-item.current { background: var(--current-bg); border-color: var(--current-border); box-shadow: 0 0 0 1px var(--current-border); }
.quest-item.locked { opacity: 0.45; }
.quest-header { display: flex; align-items: baseline; gap: 6px; overflow: hidden; }
.quest-idx { font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
.quest-item.done .quest-idx { color: var(--done-text); }
.quest-desc { font-size: 13px; font-weight: 500; line-height: 1.35; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; min-width: 0; }
.quest-item.done .quest-desc { color: var(--done-text); }
.done-tag { font-size: 9px; font-weight: 700; background: var(--done-text); color: #000; padding: 1px 4px; border-radius: 8px; flex-shrink: 0; }
.quest-xp { font-size: 10px; color: var(--accent2); margin-top: 3px; }
.quest-unlock { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.quest-unlock span { color: var(--accent2); font-weight: 600; }
.quest-left { flex: 1; min-width: 0; }
.quest-reqs {
  display: flex; flex-wrap: wrap; gap: 2px;
  align-items: center; justify-content: flex-end;
  flex-shrink: 0; max-width: 42%;
}

/* ── Compact req chips ─────────────────────── */
.req-chip {
  position: relative; display: inline-block;
  width: 30px; height: 30px;
  vertical-align: middle; margin: 1px; flex-shrink: 0;
}
.req-chip img {
  width: 26px; height: 26px; object-fit: contain;
  border-radius: 5px; border: 1px solid var(--border); display: block;
}
.req-chip-ph {
  width: 26px; height: 26px; background: var(--border);
  border-radius: 5px; display: flex; align-items: center;
  justify-content: center; font-size: 7px; color: var(--text-dim);
}
.req-chip-qty {
  position: absolute; bottom: 0; right: -1px;
  background: var(--accent2); color: #000; font-size: 7px; font-weight: 700;
  padding: 0 2px; border-radius: 3px; line-height: 11px;
  pointer-events: none; font-style: normal;
}
.req-chip-lv {
  position: absolute; top: 0; left: -1px;
  background: rgba(74,144,226,0.9); color: #fff; font-size: 7px; font-weight: 700;
  padding: 0 2px; border-radius: 3px; line-height: 11px;
  pointer-events: none; font-style: normal;
}
.quest-item.done .req-chip { opacity: .5; }

/* ── Items needed ──────────────────────────── */
.item-row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 6px;
  border-radius: var(--radius);
  background: var(--card);
  border: 1px solid var(--border);
  margin-bottom: 4px;
}
.item-row img { width: 28px; height: 28px; object-fit: contain; border-radius: 5px; flex-shrink: 0; }
.item-icon-ph { width: 28px; height: 28px; background: var(--border); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text-dim); flex-shrink: 0; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 11px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-chain { font-size: 9px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-qty { font-size: 13px; font-weight: 700; color: var(--accent2); flex-shrink: 0; }

/* ── XP chip (reuses item-chip base) ──────── */
.xp-chip-inner {
  width: 44px; height: 44px; background: var(--card);
  border: 1px solid var(--border); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}

/* ── Empty / footer ────────────────────────── */
.empty { text-align: center; padding: 20px 12px; color: var(--text-dim); font-size: 12px; }
.ver-badge { font-size: 10px; color: var(--text-dim); opacity: .6; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
.footer { text-align: center; padding: 14px 16px; font-size: 10px; color: var(--text-dim); border-top: 1px solid var(--border); flex-shrink: 0; }
.footer a { color: var(--accent); text-decoration: none; }

/* ── Loading ───────────────────────────────── */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 999;
}
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { color: var(--text-dim); font-size: 13px; }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>데이터 로딩 중...</p></div>

<!-- ══ Screen 1: Area List ══ -->
<div id="screenAreas" class="screen">
  <div class="header">
    <div style="flex:1">
      <h1>🏠 Merge Mansion Helper</h1>
      <div class="sub">지역을 선택하세요</div>
    </div>
    <select class="lang-select" onchange="changeLang(this.value)" id="langSelect1">
      <option value="en">EN</option><option value="ko">KO</option>
      <option value="fr">FR</option><option value="de">DE</option>
      <option value="es">ES</option><option value="it">IT</option>
      <option value="pt">PT</option><option value="ru">RU</option>
      <option value="ja">JA</option>
    </select>
    <span class="ver-badge">v250502.6</span>
  </div>
  <div id="areaList"></div>
  <div class="footer">Data sourced from <a href="https://merge-mansion.fandom.com/wiki/Areas" target="_blank">Merge Mansion Wiki</a> (CC-BY-SA)</div>
</div>

<!-- ══ Screen 2: Area Detail ══ -->
<div id="screenArea" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showAreaList()">‹</button>
    <div style="flex:1;min-width:0">
      <h1 id="areaTitle"></h1>
      <div class="sub" id="areaSub"></div>
    </div>
    <select class="lang-select" onchange="changeLang(this.value)" id="langSelect2">
      <option value="en">EN</option><option value="ko">KO</option>
      <option value="fr">FR</option><option value="de">DE</option>
      <option value="es">ES</option><option value="it">IT</option>
      <option value="pt">PT</option><option value="ru">RU</option>
      <option value="ja">JA</option>
    </select>
    <span class="ver-badge">v250502.6</span>
  </div>

  <div class="progress-bar">
    <div class="progress-labels">
      <span id="progressLabel">진행도</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="area-body">
    <!-- Left: quests -->
    <div class="quest-panel">
      <div class="panel-title">📋 임무 목록</div>
      <div id="questList"></div>
    </div>

    <!-- Right: items + rewards -->
    <div class="right-panel">
      <div class="items-panel">
        <div class="panel-title">🧰 남은 필요 아이템<button class="view-toggle" id="itemViewToggle" onclick="toggleItemView()">목록</button></div>
        <div class="panel-scroll" id="itemsList"></div>
      </div>
      <div class="rewards-panel">
        <div class="panel-title">🎁 남은 보상</div>
        <div class="panel-scroll" id="rewardsList"></div>
      </div>
    </div>
  </div>
</div>

<script>
let DATA = null;
let currentArea = null;
let completedTaskIds = new Set();

// ── i18n ──────────────────────────────────────────────────────────
let currentLang = 'en';
let I18N = {};
const SUPPORTED_LANGS = ['en','ko','fr','de','es','it','pt','ru','ja'];

function t(mpcKey, fallback) {
  return (mpcKey && I18N[mpcKey]) || fallback || '';
}

function detectLang() {
  const saved = localStorage.getItem('mmh_lang');
  if (saved && SUPPORTED_LANGS.includes(saved)) return saved;
  const browser = (navigator.language || 'en').split('-')[0].toLowerCase();
  return SUPPORTED_LANGS.includes(browser) ? browser : 'en';
}

async function loadI18n(lang) {
  try {
    const resp = await fetch(`data/i18n/${lang}.json`);
    I18N = await resp.json();
    currentLang = lang;
    localStorage.setItem('mmh_lang', lang);
    document.documentElement.lang = lang;
    document.querySelectorAll('.lang-select').forEach(s => s.value = lang);
  } catch(e) { console.warn('i18n load failed:', lang); }
}

async function changeLang(lang) {
  await loadI18n(lang);
  if (document.getElementById('screenArea').classList.contains('active') && currentArea) {
    render();
  } else {
    showAreaList();
  }
}
let itemViewCompact = true;

function imgUrl(url) {
  if (!url) return null;
  if (url.startsWith('http://') || url.startsWith('https://')) return url;
  return url.split('/').map(encodeURIComponent).join('/');
}

// ── State ─────────────────────────────────────────────────────────
function saveState() {
  const saved = JSON.parse(localStorage.getItem('mmh_progress') || '{}');
  if (currentArea) saved[currentArea.name] = [...completedTaskIds];
  localStorage.setItem('mmh_progress', JSON.stringify(saved));
}

function loadCompletedIds(area) {
  const val = JSON.parse(localStorage.getItem('mmh_progress') || '{}')[area.name];
  if (!val) return new Set();
  // Migration: if stored as a number, convert to first N task IDs
  if (typeof val === 'number') return new Set(area.tasks.slice(0, val).map(t => t.id));
  return new Set(val);
}

// ── Task availability ─────────────────────────────────────────────
function isTaskAvailable(task, inArea) {
  const parents = (task.parents || []).filter(p => inArea.has(p));
  return parents.every(p => completedTaskIds.has(p));
}

// ── Toggle task completion ────────────────────────────────────────
function toggleTask(taskId) {
  const tasks = currentArea.tasks;
  const inArea = new Set(tasks.map(t => t.id));
  const task = tasks.find(t => t.id === taskId);

  if (completedTaskIds.has(taskId)) {
    // Already done → undo: cascade-remove this task and all dependents
    const toRemove = new Set([taskId]);
    let changed = true;
    while (changed) {
      changed = false;
      for (const t of tasks) {
        if (!toRemove.has(t.id) && completedTaskIds.has(t.id)) {
          const parents = (t.parents || []).filter(p => inArea.has(p));
          if (parents.some(p => toRemove.has(p))) {
            toRemove.add(t.id);
            changed = true;
          }
        }
      }
    }
    for (const id of toRemove) completedTaskIds.delete(id);

  } else if (isTaskAvailable(task, inArea)) {
    // Current (available, not yet done) → mark this task as done
    completedTaskIds.add(taskId);

  } else {
    // Locked (not yet available) → cascade-complete ancestors only.
    // The task itself stays incomplete and naturally becomes "current".
    const taskById = Object.fromEntries(tasks.map(t => [t.id, t]));
    const toComplete = [];
    const seen = new Set();
    const q = [...(task?.parents || []).filter(p => inArea.has(p))];
    while (q.length) {
      const id = q.shift();
      if (seen.has(id) || completedTaskIds.has(id)) continue;
      seen.add(id);
      toComplete.push(id);
      for (const p of (taskById[id]?.parents || []).filter(p => inArea.has(p)))
        q.push(p);
    }
    for (const id of toComplete) completedTaskIds.add(id);
  }

  saveState();
  history.replaceState(null, '', `#${areaToSlug(currentArea)}`);
  render();
}

// ── Branch layout ─────────────────────────────────────────────────
function computeSegments(tasks) {
  const inArea = new Set(tasks.map(t => t.id));
  const taskById = Object.fromEntries(tasks.map(t => [t.id, t]));

  // Compute full descendant set for a task (following children within area)
  const descCache = {};
  function getDescendants(taskId) {
    if (descCache[taskId]) return descCache[taskId];
    const visited = new Set();
    const q = [taskId];
    while (q.length) {
      const cur = q.shift();
      if (visited.has(cur)) continue;
      visited.add(cur);
      for (const ch of (taskById[cur]?.children || [])) {
        if (inArea.has(ch)) q.push(ch);
      }
    }
    descCache[taskId] = visited;
    return visited;
  }

  const segments = [];
  const processedIds = new Set();

  for (let i = 0; i < tasks.length; i++) {
    const task = tasks[i];
    if (processedIds.has(task.id)) continue;

    const forwardChildren = (task.children || []).filter(c => inArea.has(c));

    if (forwardChildren.length >= 2) {
      segments.push({ type: 'linear', task });
      processedIds.add(task.id);

      // Compute descendant sets for each branch child
      const childDescs = forwardChildren.map(c => getDescendants(c));

      // Merge points: reachable from ALL branch children
      const mergeIds = new Set([...childDescs[0]].filter(id =>
        childDescs.every(ds => ds.has(id))
      ));

      // Exclusive tasks per branch (not in merge set)
      const exclusiveSets = childDescs.map(ds =>
        new Set([...ds].filter(id => !mergeIds.has(id)))
      );

      // Collect ordered tasks for each column from the tasks array
      const colArrays = exclusiveSets.map(() => []);
      for (let j = i + 1; j < tasks.length; j++) {
        const t = tasks[j];
        if (mergeIds.has(t.id)) break;
        if (processedIds.has(t.id)) continue;
        for (let ci = 0; ci < exclusiveSets.length; ci++) {
          if (exclusiveSets[ci].has(t.id)) {
            colArrays[ci].push(t);
            processedIds.add(t.id);
            break;
          }
        }
      }

      if (colArrays.some(col => col.length > 0)) {
        segments.push({ type: 'branch', columns: colArrays });
      }
    } else {
      segments.push({ type: 'linear', task });
      processedIds.add(task.id);
    }
  }

  return segments;
}

// ── URL routing ───────────────────────────────────────────────────
function areaToSlug(area) {
  return area.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function findAreaBySlug(slug) {
  const q = decodeURIComponent(slug).toLowerCase().replace(/-/g, ' ');
  return DATA.areas.find(a =>
    a.name.toLowerCase().replace(/[^a-z0-9 ]/g, ' ').trim().includes(q) ||
    (a.nameKo && a.nameKo.includes(decodeURIComponent(slug)))
  );
}

async function handleHash() {
  if (!DATA) return;
  const h = location.hash.slice(1);
  if (h) {
    const slug = h.split('/')[0];
    const area = findAreaBySlug(slug);
    if (area) { await _openArea(area); return; }
  }
  showAreaList();
}

// ── Load data ─────────────────────────────────────────────────────
// Startup: fetch area index + items in parallel (tasks loaded per-area on demand)
async function loadData() {
  const lang = detectLang();
  const [areasResp, itemsResp, i18nResp] = await Promise.all([
    fetch('data/areas.json'),
    fetch('data/items.json'),
    fetch(`data/i18n/${lang}.json`)
  ]);
  const [areas, items] = await Promise.all([areasResp.json(), itemsResp.json()]);
  DATA = { areas, items };
  try {
    I18N = await i18nResp.json();
    currentLang = lang;
    document.documentElement.lang = lang;
    document.querySelectorAll('.lang-select').forEach(s => s.value = lang);
  } catch(e) {}
  document.getElementById('loading').style.display = 'none';
  handleHash();
}

// Load full area data (tasks) on first access; cached on the area object.
async function loadAreaTasks(area) {
  if (area.tasks) return; // already loaded
  const resp = await fetch(`data/areas/${area.slug}.json`);
  const full = await resp.json();
  area.tasks = full.tasks || [];
}

// ── Screen: Area List ─────────────────────────────────────────────
function showAreaList() {
  history.replaceState(null, '', location.pathname + location.search);
  showScreen('screenAreas');
  const saved = JSON.parse(localStorage.getItem('mmh_progress') || '{}');
  const container = document.getElementById('areaList');
  container.innerHTML = '';

  let firstInProgress = null;
  DATA.areas.filter(a => (a.taskCount || 0) > 0).forEach(area => {
    const rawVal = saved[area.name];
    const done = typeof rawVal === 'number' ? rawVal
      : Array.isArray(rawVal) ? rawVal.length : 0;
    const total = area.taskCount || 0;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    const isDone = done >= total && total > 0;

    const card = document.createElement('div');
    card.className = 'area-card';
    card.innerHTML = `
      <div style="min-width:0;flex:1">
        <div class="area-name-ko">${area.nameKo || area.name}</div>
        <div class="area-name-en">${area.nameKo ? area.name : ''}</div>
      </div>
      <div class="area-progress ${isDone ? 'area-done' : ''}">
        ${done > 0 ? `${done}/${total} (${pct}%)` : `${total}개`}
      </div>`;
    card.onclick = () => openArea(area);
    container.appendChild(card);
    if (!firstInProgress && done > 0 && !isDone) firstInProgress = card;
  });
  if (firstInProgress) {
    requestAnimationFrame(() => firstInProgress.scrollIntoView({ block: 'center', behavior: 'instant' }));
  }
}

// ── Screen: Area Detail ───────────────────────────────────────────
function openArea(area) {
  history.pushState(null, '', `#${areaToSlug(area)}`);
  _openArea(area);
}

async function _openArea(area) {
  // Show screen immediately with a loading indicator, then render once tasks arrive
  showScreen('screenArea');
  document.getElementById('areaTitle').textContent = area.nameKo || area.name;
  document.getElementById('areaSub').textContent = '로딩 중…';
  await loadAreaTasks(area);
  currentArea = area;
  completedTaskIds = loadCompletedIds(area);
  render();
}

function render() {
  if (!currentArea) return;
  const tasks = currentArea.tasks;
  const done = completedTaskIds.size;
  const total = tasks.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  document.getElementById('areaSub').textContent = `${currentArea.name} · ${done}/${total} 완료`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;

  renderQuests(tasks);
  renderItems(tasks);
  renderRewards(tasks);
}

// ── Render quest item HTML ────────────────────────────────────────
function renderQuestItem(task, inArea) {
  const isDone = completedTaskIds.has(task.id);
  const available = isTaskAvailable(task, inArea);
  const cls = isDone ? 'done' : available ? 'current' : 'locked';

  const reqs = task.requirements.map(r => {
    const item = DATA.items[r.name] || {};
    const name = t(item.mpcKey, item.name || r.name);
    const url = imgUrl(item.imageUrl);
    const lv = item.level || 1;
    const tip = `${name} (L${lv}) ×${r.amount}`;
    const icon = url
      ? `<img src="${url}" alt="${name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const ph = `<div class="req-chip-ph" style="${url ? 'display:none' : ''}">${r.name.slice(0,2)}</div>`;
    const lvBadge = lv > 1 ? `<i class="req-chip-lv">L${lv}</i>` : '';
    return `<span class="req-chip" title="${tip}">${icon}${ph}<i class="req-chip-qty">×${r.amount}</i>${lvBadge}</span>`;
  }).join('');

  const xp = task.rewards?.xp || 0;
  const idToIndex = Object.fromEntries(currentArea.tasks.map(t => [t.id, t.index]));
  const branchIndices = (task.children || [])
    .filter(c => inArea.has(c))
    .map(c => idToIndex[c])
    .filter(n => n !== undefined)
    .sort((a, b) => a - b);

  return `<div class="quest-item ${cls}" onclick="toggleTask('${task.id}')">
    <div class="quest-left">
      <div class="quest-header">
        <span class="quest-idx" title="${task.desc}">${task.index}</span>
        <span class="quest-desc" title="${task.desc}">${task.desc}</span>
        ${isDone ? '<span class="done-tag">완료</span>' : ''}
      </div>
      ${xp ? `<div class="quest-xp">⭐ ${xp} XP</div>` : ''}
      ${branchIndices.length >= 2 ? `<div class="quest-unlock">🔓 <span>${branchIndices.join(', ')}</span></div>` : ''}
    </div>
    ${reqs ? `<div class="quest-reqs">${reqs}</div>` : ''}
  </div>`;
}

let _bcId = 0;          // unique ID counter for branch sections; reset each render
let _rowTransitions = {}; // bcId → [{fromIdx, toIdxs}[]] per row-gap

function renderSwimlane(columns, inArea) {
  const id = `bc${++_bcId}`;

  // Each lane: { segs, ptr, laneId } — laneId uses dot-notation for hierarchy
  let lanes = columns.map((col, i) => ({
    segs: computeSegments(col), ptr: 0, laneId: String(i)
  }));

  // Collect all rows before building HTML (needed for transition mapping)
  const rowData = []; // each entry: [{laneId, isStrip, task}]
  let safety = 0;

  while (safety++ < 2000) {
    // Expand any lane whose current segment is itself a branch
    let expanded = false;
    for (let i = 0; i < lanes.length; i++) {
      const l = lanes[i];
      if (l.ptr < l.segs.length && l.segs[l.ptr].type === 'branch') {
        const inner = l.segs[l.ptr]; l.ptr++;
        const subs = inner.columns.map((sub, si) => ({
          segs: computeSegments(sub), ptr: 0,
          laneId: l.laneId + '.' + si
        }));
        lanes.splice(i, 1, ...subs);
        expanded = true;
        break;
      }
    }
    if (expanded) continue;
    if (!lanes.some(l => l.ptr < l.segs.length)) break;

    rowData.push(lanes.map(l => {
      const isStrip = l.ptr >= l.segs.length;
      const task = isStrip ? null : l.segs[l.ptr++].task;
      return { laneId: l.laneId, isStrip, task };
    }));
  }

  // Compute row-to-row lane transitions (for bezier connector drawing)
  // A cell in row R maps to cells in row R+1 whose laneId equals or starts with cell's laneId
  const transitions = rowData.slice(0, -1).map((prev, r) => {
    const next = rowData[r + 1];
    return prev.map((cell, fi) => ({
      fromIdx: fi,
      toIdxs: next
        .map((c, ni) => ni)
        .filter(ni => {
          const lid = next[ni].laneId;
          return lid === cell.laneId || lid.startsWith(cell.laneId + '.');
        })
    }));
  });
  _rowTransitions[id] = transitions;

  // Build HTML: level-rows interleaved with row-connector gaps
  let body = '';
  rowData.forEach((cells, r) => {
    const rowHtml = cells.map(c =>
      c.isStrip
        ? `<div class="level-strip" data-lane="${c.laneId}"></div>`
        : `<div class="level-cell" data-lane="${c.laneId}">${renderQuestItem(c.task, inArea)}</div>`
    ).join('');
    body += `<div class="level-row">${rowHtml}</div>`;
    if (r < rowData.length - 1) {
      body += `<div class="row-connector" data-bc="${id}" data-row="${r}"><svg></svg></div>`;
    }
  });

  return [
    `<div class="branch-split-gap" data-bc="${id}"><svg></svg></div>`,
    `<div class="swimlane-body" id="${id}">${body}</div>`,
    `<div class="branch-merge-gap" data-bc="${id}"><svg></svg></div>`
  ].join('');
}

function renderSegments(segments, inArea) {
  return segments.map(seg => {
    if (seg.type === 'linear') return renderQuestItem(seg.task, inArea);
    return renderSwimlane(seg.columns, inArea);
  }).join('');
}

// ── SVG connector drawing ─────────────────────────────────────────

// Split-gap / merge-gap connectors (outer branch boundaries)
function drawConnector(gapEl, isMerge) {
  const bodyEl = document.getElementById(gapEl.dataset.bc);
  if (!bodyEl) return;
  const gRect = gapEl.getBoundingClientRect();
  const w = gRect.width, h = gapEl.offsetHeight;
  if (w < 2 || h < 2) return;

  const rows = [...bodyEl.querySelectorAll(':scope > .level-row')];
  if (!rows.length) return;

  const refRow = isMerge ? rows[rows.length - 1] : rows[0];
  // For split: only active cells (first row never has strips).
  // For merge: include strips too — exhausted lanes are also prerequisites of the merge task.
  const cells = isMerge
    ? [...refRow.children]
    : [...refRow.querySelectorAll(':scope > .level-cell')];
  if (!cells.length) return;

  const stroke = 'rgba(74,144,226,0.7)';
  const fullCx = w / 2;
  const svg = gapEl.querySelector('svg');
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);

  svg.innerHTML = cells.map(cell => {
    const r = cell.getBoundingClientRect();
    const colX = (r.left + r.right) / 2 - gRect.left;
    const isStrip = cell.classList.contains('level-strip');
    const sw = isStrip ? 4 : 2;
    const d = isMerge
      ? `M${colX},0 C${colX},${h*0.55} ${fullCx},${h*0.45} ${fullCx},${h}`
      : `M${fullCx},0 C${fullCx},${h*0.55} ${colX},${h*0.45} ${colX},${h}`;
    return `<path d="${d}" stroke="${stroke}" stroke-width="${sw}" fill="none"/>`;
  }).join('');
}

// Row-to-row connectors (within a swimlane, between consecutive level-rows)
function drawRowConnector(gapEl) {
  const id = gapEl.dataset.bc;
  const rowIdx = parseInt(gapEl.dataset.row);
  const transitions = _rowTransitions[id];
  if (!transitions || !transitions[rowIdx]) return;

  const bodyEl = document.getElementById(id);
  if (!bodyEl) return;

  const rows = [...bodyEl.querySelectorAll(':scope > .level-row')];
  const fromRow = rows[rowIdx];
  const toRow = rows[rowIdx + 1];
  if (!fromRow || !toRow) return;

  const gRect = gapEl.getBoundingClientRect();
  const w = gRect.width, h = gapEl.offsetHeight;
  if (w < 2 || h < 2) return;

  const fromCells = [...fromRow.children];
  const toCells = [...toRow.children];
  const stroke = 'rgba(74,144,226,0.7)';
  const paths = [];

  transitions[rowIdx].forEach(({ fromIdx, toIdxs }) => {
    const fromCell = fromCells[fromIdx];
    if (!fromCell) return;
    const fr = fromCell.getBoundingClientRect();
    const fromX = (fr.left + fr.right) / 2 - gRect.left;
    const isFromStrip = fromCell.classList.contains('level-strip');

    toIdxs.forEach(ti => {
      const toCell = toCells[ti];
      if (!toCell) return;
      const tr = toCell.getBoundingClientRect();
      const toX = (tr.left + tr.right) / 2 - gRect.left;
      const isToStrip = toCell.classList.contains('level-strip');

      const sw = (isFromStrip && isToStrip) ? 4 : 2;
      const sameX = Math.abs(fromX - toX) < 3;
      const d = sameX
        ? `M${fromX},0 L${toX},${h}`
        : `M${fromX},0 C${fromX},${h * 0.6} ${toX},${h * 0.4} ${toX},${h}`;
      paths.push(`<path d="${d}" stroke="${stroke}" stroke-width="${sw}" fill="none" stroke-linecap="round"/>`);
    });
  });

  const svg = gapEl.querySelector('svg');
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.innerHTML = paths.join('');
}

function drawAllConnectors(containerEl) {
  containerEl.querySelectorAll('.branch-split-gap').forEach(g => drawConnector(g, false));
  containerEl.querySelectorAll('.branch-merge-gap').forEach(g => drawConnector(g, true));
  containerEl.querySelectorAll('.row-connector').forEach(g => drawRowConnector(g));
}



function renderQuests(tasks) {
  const el = document.getElementById('questList');
  const inArea = new Set(tasks.map(t => t.id));
  _bcId = 0;
  _rowTransitions = {};
  const segments = computeSegments(tasks);
  el.innerHTML = renderSegments(segments, inArea);

  requestAnimationFrame(() => {
    drawAllConnectors(el);
    const cur = el.querySelector('.quest-item.current');
    if (!cur) return;
    const allItems = [...el.querySelectorAll('.quest-item')];
    const idx = allItems.indexOf(cur);
    if (idx <= 0) {
      el.scrollTop = 0;
    } else {
      // Scroll so the task just above the current task sits at the bottom of the viewport
      const prev = allItems[idx - 1];
      const containerRect = el.getBoundingClientRect();
      const prevRect = prev.getBoundingClientRect();
      el.scrollTop += prevRect.bottom - containerRect.bottom + 8;
    }
  });
}

function renderItems(tasks) {
  const el = document.getElementById('itemsList');
  const remaining = tasks.filter(t => !completedTaskIds.has(t.id));
  const totals = {};
  for (const task of remaining)
    for (const req of task.requirements)
      totals[req.name] = (totals[req.name] || 0) + req.amount;

  const entries = Object.entries(totals).sort((a, b) => {
    const ia = DATA.items[a[0]] || {}, ib = DATA.items[b[0]] || {};
    const ca = ia.chainName || a[0], cb = ib.chainName || b[0];
    if (ca !== cb) return ca.localeCompare(cb);
    return (ib.level || 1) - (ia.level || 1);
  });
  if (!entries.length) { el.innerHTML = '<div class="empty">없음 🎉</div>'; return; }

  if (itemViewCompact) {
    el.innerHTML = `<div class="items-compact-grid">${entries.map(([id, qty]) => {
      const item = DATA.items[id] || {};
      const name = t(item.mpcKey, item.name || id);
      const lv = item.level || 1;
      const url = imgUrl(item.imageUrl);
      const tip = `${name} (L${lv}) ×${qty}`;
      const icon = url
        ? `<img src="${url}" alt="${name}" title="${tip}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const ph = `<div class="item-chip-ph" title="${tip}" style="${url ? 'display:none' : ''}">${id.slice(0,3)}</div>`;
      return `<div class="item-chip">${icon}${ph}<span class="item-chip-qty">×${qty}</span><span class="item-chip-lv">L${lv}</span></div>`;
    }).join('')}</div>`;
  } else {
    el.innerHTML = entries.map(([id, qty]) => {
      const item = DATA.items[id] || {};
      const name = t(item.mpcKey, item.name || id);
      const chain = item.chainName || '';
      const url = imgUrl(item.imageUrl);
      const icon = url
        ? `<img src="${url}" alt="${name}" loading="lazy" onerror="this.parentElement.querySelector('.item-icon-ph').style.display='flex';this.style.display='none'">`
        : '';
      const ph = `<div class="item-icon-ph" style="${url ? 'display:none' : ''}">${id.slice(0,3)}</div>`;
      return `<div class="item-row">${icon}${ph}
        <div class="item-info">
          <div class="item-name" title="${name}">${name}</div>
          <div class="item-chain">${chain}</div>
        </div>
        <div class="item-qty">×${qty}</div>
      </div>`;
    }).join('');
  }
}

function toggleItemView() {
  itemViewCompact = !itemViewCompact;
  document.getElementById('itemViewToggle').textContent = itemViewCompact ? '목록' : '아이콘';
  if (currentArea) renderItems(currentArea.tasks);
}

function renderRewards(tasks) {
  const el = document.getElementById('rewardsList');
  const remaining = tasks.filter(t => !completedTaskIds.has(t.id));
  let totalXP = 0;
  const items = {};
  for (const task of remaining) {
    totalXP += task.rewards?.xp || 0;
    if (task.rewards?.item)
      items[task.rewards.item] = (items[task.rewards.item] || 0) + 1;
  }

  if (!totalXP && !Object.keys(items).length) {
    el.innerHTML = '<div class="empty">없음 🎉</div>'; return;
  }

  const chips = [];
  if (totalXP) {
    const label = totalXP >= 1000 ? `${(totalXP/1000).toFixed(1).replace(/\.0$/,'')}k` : String(totalXP);
    chips.push(`<div class="item-chip" title="경험치 ${totalXP.toLocaleString()} XP">
      <div class="xp-chip-inner">⭐</div>
      <span class="item-chip-qty">${label}</span>
    </div>`);
  }
  for (const [id, cnt] of Object.entries(items)) {
    const item = DATA.items[id] || {};
    const name = t(item.mpcKey, item.name || id);
    const lv = item.level || 1;
    const url = imgUrl(item.imageUrl);
    const tip = `${name} (L${lv})`;
    const icon = url
      ? `<img src="${url}" alt="${name}" title="${tip}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const ph = `<div class="item-chip-ph" title="${tip}" style="${url ? 'display:none' : ''}">${id.slice(0,3)}</div>`;
    chips.push(`<div class="item-chip">${icon}${ph}${cnt > 1 ? `<span class="item-chip-qty">×${cnt}</span>` : ''}<span class="item-chip-lv">L${lv}</span></div>`);
  }
  el.innerHTML = `<div class="items-compact-grid">${chips.join('')}</div>`;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Boot ──────────────────────────────────────────────────────────
window.addEventListener('popstate', handleHash);

loadData().catch(err => {
  document.getElementById('loading').innerHTML = `
    <div style="color:var(--accent);font-size:16px">❌ 데이터 로드 실패</div>
    <div style="color:var(--text-dim);font-size:12px;margin-top:8px">${err.message}</div>
    <div style="color:var(--text-dim);font-size:11px;margin-top:12px">로컬 실행 시: <code>python3 -m http.server</code></div>`;
});
</script>
