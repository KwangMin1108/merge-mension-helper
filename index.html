<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Merge Mansion Helper</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --accent2: #f5a623;
    --text: #eaeaea;
    --text-dim: #8892a4;
    --done: #2d6a4f;
    --done-text: #95d5b2;
    --border: #1e3a5f;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Screens ─── */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ─── Header ─── */
  .header {
    background: var(--surface);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header h1 { font-size: 18px; font-weight: 700; flex: 1; }
  .header .subtitle { font-size: 13px; color: var(--text-dim); }
  .back-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 22px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }

  /* ─── Area list ─── */
  #areaList {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    overflow-y: auto;
  }
  .area-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid var(--border);
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .area-card:active { background: #1a4a80; }
  .area-card .area-name { font-weight: 600; font-size: 15px; }
  .area-card .area-meta { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
  .area-card .area-num {
    font-size: 12px;
    color: var(--text-dim);
    background: var(--bg);
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* ─── Progress bar ─── */
  .progress-section {
    background: var(--surface);
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .progress-bar-outer {
    background: var(--bg);
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 6px;
    transition: width 0.3s;
  }

  /* ─── Tab bar ─── */
  .tab-bar {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 57px;
    z-index: 90;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 4px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ─── Tab content ─── */
  .tab-content { display: none; flex: 1; overflow-y: auto; padding: 12px 16px; }
  .tab-content.active { display: block; }

  /* ─── Quest list ─── */
  .quest-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px;
    margin-bottom: 8px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .quest-item.done {
    background: var(--done);
    border-color: #3a8a62;
    opacity: 0.8;
  }
  .quest-item.current {
    border-color: var(--accent2);
    background: #2a1f0e;
    box-shadow: 0 0 0 2px var(--accent2);
  }
  .quest-num {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 24px;
    margin-top: 2px;
  }
  .quest-item.done .quest-num { color: var(--done-text); }
  .quest-info { flex: 1 }
  .quest-desc { font-size: 14px; font-weight: 500; line-height: 1.4; }
  .quest-item.done .quest-desc { color: var(--done-text); }
  .quest-reqs {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .req-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg);
    border-radius: 20px;
    padding: 2px 8px 2px 4px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .req-chip img {
    width: 20px;
    height: 20px;
    object-fit: contain;
    border-radius: 4px;
  }
  .req-chip .req-icon-placeholder {
    width: 20px;
    height: 20px;
    background: var(--border);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--text-dim);
  }
  .quest-reward {
    margin-top: 6px;
    font-size: 11px;
    color: var(--accent2);
  }
  .current-badge {
    font-size: 10px;
    background: var(--accent2);
    color: #000;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 700;
    margin-left: 6px;
  }

  /* ─── Items needed tab ─── */
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
  }
  .item-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--border);
  }
  .item-card img {
    width: 36px;
    height: 36px;
    object-fit: contain;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .item-card .item-icon-placeholder {
    width: 36px;
    height: 36px;
    background: var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text-dim);
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-amount { font-size: 13px; color: var(--accent2); font-weight: 700; }
  .item-id { font-size: 10px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ─── Rewards tab ─── */
  .reward-row {
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid var(--border);
  }
  .reward-row .rname { font-size: 13px; }
  .reward-row .ramt { font-size: 15px; font-weight: 700; color: var(--accent2); }

  /* ─── Empty state ─── */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* ─── Loading ─── */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 999;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--text-dim); font-size: 14px; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>데이터 로딩 중...</p>
</div>

<!-- ══════════ Screen 1: Area List ══════════ -->
<div id="screenAreas" class="screen">
  <div class="header">
    <div style="flex:1">
      <h1>🏠 Merge Mansion Helper</h1>
      <div class="subtitle">지역을 선택하세요</div>
    </div>
  </div>
  <div id="areaList"></div>
</div>

<!-- ══════════ Screen 2: Area Detail ══════════ -->
<div id="screenArea" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showAreaList()">‹</button>
    <div style="flex:1">
      <h1 id="areaTitle">지역</h1>
      <div class="subtitle" id="areaSubtitle"></div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-label">
      <span id="progressLabel">진행도</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('quests')">📋 임무</button>
    <button class="tab-btn" onclick="switchTab('items')">🧰 필요 아이템</button>
    <button class="tab-btn" onclick="switchTab('rewards')">🎁 남은 보상</button>
  </div>

  <div id="tabQuests" class="tab-content active"></div>
  <div id="tabItems" class="tab-content"></div>
  <div id="tabRewards" class="tab-content"></div>
</div>

<script>
let DATA = null;
let currentArea = null;
let currentTaskIndex = 0; // user is currently ON this task (0-based index in sorted tasks)
let activeTab = 'quests';

// ─── State persistence ────────────────────────────────────────────────────────
function saveState() {
  const s = {};
  if (currentArea) {
    s[currentArea.name] = currentTaskIndex;
  }
  // Merge with existing saved states
  const existing = JSON.parse(localStorage.getItem('mmh_progress') || '{}');
  Object.assign(existing, s);
  localStorage.setItem('mmh_progress', JSON.stringify(existing));
}

function loadTaskIndex(areaName) {
  const saved = JSON.parse(localStorage.getItem('mmh_progress') || '{}');
  return saved[areaName] ?? 0;
}

// ─── Data loading ─────────────────────────────────────────────────────────────
async function loadData() {
  const resp = await fetch('data.json');
  DATA = await resp.json();
  document.getElementById('loading').style.display = 'none';
  showAreaList();
}

// ─── Screen: Area List ────────────────────────────────────────────────────────
function showAreaList() {
  showScreen('screenAreas');
  const container = document.getElementById('areaList');
  container.innerHTML = '';
  const saved = JSON.parse(localStorage.getItem('mmh_progress') || '{}');

  renderFooter();
  DATA.areas
    .filter(a => a.tasks.length > 0)
    .forEach((area, i) => {
      const taskIdx = saved[area.name] ?? 0;
      const done = taskIdx;
      const total = area.tasks.length;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;

      const card = document.createElement('div');
      card.className = 'area-card';
      card.innerHTML = `
        <div>
          <div class="area-name">${area.name}</div>
          <div class="area-meta">${done > 0 ? `${done}/${total} 완료 (${pct}%)` : `${total}개 임무`}</div>
        </div>
        <div class="area-num">#${Math.floor(area.orderingIndex)}</div>
      `;
      card.onclick = () => openArea(area);
      container.appendChild(card);
    });
}

// ─── Screen: Area Detail ──────────────────────────────────────────────────────
function openArea(area) {
  currentArea = area;
  currentTaskIndex = loadTaskIndex(area.name);
  showScreen('screenArea');
  document.getElementById('areaTitle').textContent = area.name;
  switchTab('quests');
  render();
}

function render() {
  if (!currentArea) return;
  const tasks = currentArea.tasks;
  const total = tasks.length;
  const done = currentTaskIndex;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('areaSubtitle').textContent = `${done}/${total} 임무 완료`;
  document.getElementById('progressLabel').textContent = `진행도`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressBar').style.width = `${pct}%`;

  renderQuests(tasks, done);
  renderItems(tasks, done);
  renderRewards(tasks, done);
}

function renderQuests(tasks, doneCount) {
  const container = document.getElementById('tabQuests');
  if (tasks.length === 0) {
    container.innerHTML = '<div class="empty">임무 데이터가 없습니다.</div>';
    return;
  }

  container.innerHTML = tasks.map((task, i) => {
    const isDone = i < doneCount;
    const isCurrent = i === doneCount;
    const cls = isDone ? 'done' : isCurrent ? 'current' : '';

    const reqs = task.requirements.map(r => {
      const item = DATA.items[r.name] || {};
      const name = item.name || r.name;
      const imgHtml = item.imageUrl
        ? `<img src="${item.imageUrl}" alt="${name}" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="req-icon-placeholder">${r.name.slice(0,2)}</div>`;
      return `<span class="req-chip">${imgHtml}${name}×${r.amount}</span>`;
    }).join('');

    const rewardHtml = task.rewards.item
      ? `<div class="quest-reward">🎁 ${DATA.items[task.rewards.item]?.name || task.rewards.item}</div>`
      : '';

    const badgeHtml = isCurrent
      ? `<span class="current-badge">현재</span>` : '';

    return `
      <div class="quest-item ${cls}" onclick="setCurrentTask(${i})">
        <div class="quest-num">${task.index}</div>
        <div class="quest-info">
          <div class="quest-desc">${task.desc}${badgeHtml}</div>
          ${reqs ? `<div class="quest-reqs">${reqs}</div>` : ''}
          ${rewardHtml}
        </div>
      </div>
    `;
  }).join('');

  // Scroll current task into view
  setTimeout(() => {
    const el = container.querySelector('.quest-item.current');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function renderItems(tasks, doneCount) {
  const container = document.getElementById('tabItems');
  const remaining = tasks.slice(doneCount);

  // Aggregate required items
  const totals = {};
  for (const task of remaining) {
    for (const req of task.requirements) {
      totals[req.name] = (totals[req.name] || 0) + req.amount;
    }
  }

  const entries = Object.entries(totals).sort((a, b) => b[1] - a[1]);
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty">남은 필요 아이템이 없습니다. 🎉</div>';
    return;
  }

  container.innerHTML = `
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">
      앞으로 필요한 아이템 (${entries.length}종, 임무 ${doneCount + 1}~${tasks.length})
    </div>
    <div class="items-grid">
      ${entries.map(([id, amount]) => {
        const item = DATA.items[id] || {};
        const name = item.name || id;
        const imgHtml = item.imageUrl
          ? `<img src="${item.imageUrl}" alt="${name}" loading="lazy" onerror="this.parentElement.querySelector('.item-icon-placeholder').style.display='flex';this.style.display='none'">`
          : '';
        const ph = `<div class="item-icon-placeholder" style="${item.imageUrl ? 'display:none' : ''}">${id.slice(0,3)}</div>`;
        return `
          <div class="item-card">
            ${imgHtml}${ph}
            <div class="item-info">
              <div class="item-amount">×${amount}</div>
              <div class="item-name" title="${name}">${name}</div>
              <div class="item-id">${id}</div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderRewards(tasks, doneCount) {
  const container = document.getElementById('tabRewards');
  const remaining = tasks.slice(doneCount);

  let totalXP = 0;
  const items = {};

  for (const task of remaining) {
    totalXP += task.rewards.xp || 0;
    if (task.rewards.item) {
      items[task.rewards.item] = (items[task.rewards.item] || 0) + 1;
    }
  }

  if (totalXP === 0 && Object.keys(items).length === 0) {
    container.innerHTML = '<div class="empty">남은 보상이 없습니다. 🎉</div>';
    return;
  }

  const itemRows = Object.entries(items).map(([id, count]) => {
    const name = DATA.items[id]?.name || id;
    return `
      <div class="reward-row">
        <span class="rname">🎁 ${name}</span>
        <span class="ramt">×${count}</span>
      </div>
    `;
  }).join('');

  container.innerHTML = `
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">
      임무 ${doneCount + 1}~${tasks.length} 남은 보상
    </div>
    <div class="reward-row">
      <span class="rname">⭐ 경험치 (XP)</span>
      <span class="ramt">${totalXP.toLocaleString()}</span>
    </div>
    ${itemRows}
  `;
}

// ─── Interactions ─────────────────────────────────────────────────────────────
function setCurrentTask(index) {
  // Tapping a task: set it as the current task (=first remaining)
  // So tasks 0..index-1 are done, tasks index..N are remaining
  currentTaskIndex = index;
  saveState();
  render();
  if (activeTab !== 'quests') switchTab('quests');
}

function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    const tabs = ['quests', 'items', 'rewards'];
    btn.classList.toggle('active', tabs[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.add('active');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── Footer ───────────────────────────────────────────────────────────────────
function renderFooter() {
  const footer = document.createElement('div');
  footer.style.cssText = 'text-align:center;padding:20px 16px;font-size:11px;color:var(--text-dim);border-top:1px solid var(--border);margin-top:8px;';
  footer.innerHTML = 'Data sourced from <a href="https://merge-mansion.fandom.com/wiki/Areas" target="_blank" style="color:var(--accent);text-decoration:none;">Merge Mansion Wiki</a> (CC-BY-SA)';
  document.getElementById('areaList').after(footer);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadData().catch(err => {
  document.getElementById('loading').innerHTML = `
    <div style="color:var(--accent);font-size:16px;">❌ 데이터 로드 실패</div>
    <div style="color:var(--text-dim);font-size:13px;margin-top:8px;">${err.message}</div>
    <div style="color:var(--text-dim);font-size:12px;margin-top:16px;">
      로컬에서 실행 시 <code>python3 -m http.server</code>를 사용하세요
    </div>
  `;
});
</script>
</body>
</html>
