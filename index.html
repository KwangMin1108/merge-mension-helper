<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Merge Mansion Helper</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="loading"><div class="spinner"></div><p>데이터 로딩 중...</p></div>

<!-- ══ Screen 1: Area List ══ -->
<div id="screenAreas" class="screen">
  <div class="header">
    <div style="flex:1">
      <h1>🏠 Merge Mansion Helper</h1>
      <div class="sub">지역을 선택하세요</div>
    </div>
    <select class="lang-select" onchange="changeLang(this.value)" id="langSelect1">
      <option value="en">EN</option><option value="ko">KO</option>
      <option value="fr">FR</option><option value="de">DE</option>
      <option value="es">ES</option><option value="it">IT</option>
      <option value="pt">PT</option><option value="ru">RU</option>
      <option value="ja">JA</option>
    </select>
    <span class="ver-badge">v260515.1</span>
  </div>
  <div id="areaList"></div>
  <div class="footer">
    <div style="margin-bottom:6px">
      👣 방문자 <span id="visitorCount" style="color:var(--accent);font-weight:700">…</span>
    </div>
    퀘스트/아이템 데이터: <a href="https://merge-mansion.fandom.com/wiki/Areas" target="_blank">Merge Mansion Wiki</a> (CC-BY-SA) ·
    번역 데이터: © Metacore Games (팬 프로젝트 목적으로만 사용) ·
    Merge Mansion은 Metacore Games의 상표입니다
  </div>
</div>

<!-- ══ Screen 2: Area Detail ══ -->
<div id="screenArea" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showAreaList()">‹</button>
    <div style="flex:1;min-width:0">
      <h1 id="areaTitle"></h1>
      <div class="sub" id="areaSub"></div>
    </div>
    <select class="lang-select" onchange="changeLang(this.value)" id="langSelect2">
      <option value="en">EN</option><option value="ko">KO</option>
      <option value="fr">FR</option><option value="de">DE</option>
      <option value="es">ES</option><option value="it">IT</option>
      <option value="pt">PT</option><option value="ru">RU</option>
      <option value="ja">JA</option>
    </select>
    <span class="ver-badge">v260515.1</span>
  </div>

  <div class="progress-bar">
    <div class="progress-labels">
      <span id="progressLabel">진행도</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="area-body">
    <!-- Left: quests -->
    <div class="quest-panel">
      <div class="panel-title">📋 임무 목록</div>
      <div id="questList"></div>
    </div>

    <!-- Right: items + rewards -->
    <div class="right-panel">
      <div class="items-panel">
        <div class="panel-title">🧰 남은 필요 아이템<button class="view-toggle" id="itemViewToggle" onclick="toggleItemView()">목록</button></div>
        <div class="panel-scroll" id="itemsList"></div>
      </div>
      <div class="rewards-panel">
        <div class="panel-title">🎁 남은 보상</div>
        <div class="panel-scroll" id="rewardsList"></div>
      </div>
    </div>
  </div>
</div>

<script src="js/i18n.js?v=260515.1"></script>
<script src="js/state.js?v=260515.1"></script>
<script src="js/segments.js?v=260515.1"></script>
<script src="js/render.js?v=260515.1"></script>
<script src="js/app.js?v=260515.1"></script>
<script data-goatcounter="https://kwangminlee1108.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<script>
fetch('https://kwangminlee1108.goatcounter.com/counter/%2Fmerge-mension-helper%2F.json')
  .then(r => r.json())
  .then(d => {
    const el = document.getElementById('visitorCount');
    if (el && d.count) el.textContent = Number(d.count).toLocaleString();
  })
  .catch(() => {});
</script>
</body>
</html>
